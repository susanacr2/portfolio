.cs-meta-val{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:1rem;color:var(--black);}

/* METRICS BAR */
.cs-metrics-bar{background:var(--surface);border-bottom:0.5px solid var(--border);padding:1.75rem 2.5rem;}
.cs-metrics-inner{max-width:780px;margin:0 auto;display:flex;justify-content:center;gap:4rem;flex-wrap:wrap;}
.cs-metric{display:flex;flex-direction:column;align-items:center;gap:3px;}
.cs-metric-val{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.9rem;letter-spacing:-.03em;color:var(--coral);}
.cs-metric-lbl{font-size:.7rem;color:var(--gray);text-align:center;max-width:120px;line-height:1.3;}

.cs-activity-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin:1.5rem 0;}

.cs-step:not(:last-child)::after{content:'';position:absolute;left:15px;top:32px;bottom:0;width:0.5px;background:var(--border);}
.cs-step-num{width:32px;height:32px;border-radius:50%;background:#FFF0EB;color:#9A3412;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:.78rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;z-index:1;}
.cs-step-title{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:.95rem;margin-bottom:.25rem;}
.cs-step-desc{font-size:.83rem;color:var(--gray);line-height:1.65;}

/* PERSONA CARD */
.cs-persona{background:linear-gradient(135deg,#FFF0EB,#FFF8F5);border:0.5px solid rgba(216,90,48,.15);border-radius:16px;padding:1.5rem;margin:1.5rem 0;display:flex;gap:1.25rem;align-items:flex-start;}
.cs-persona-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#D85A30,#F07B5A);display:flex;align-items:center;justify-content:center;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.1rem;color:#fff;flex-shrink:0;}
.cs-persona-name{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:1rem;color:var(--black);margin-bottom:2px;}
.cs-persona-role{font-size:.75rem;color:var(--coral);font-weight:500;}
.cs-persona-desc{font-size:.82rem;color:var(--gray);line-height:1.6;margin-top:.5rem;}

/* WORKFLOW CARDS */
.cs-workflow-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.875rem;margin:1.5rem 0;}
.cs-workflow-card{background:var(--surface);border-radius:14px;padding:1.25rem;}
.cs-workflow-icon{width:36px;height:36px;border-radius:10px;background:#FFF0EB;display:flex;align-items:center;justify-content:center;margin-bottom:.75rem;}
.cs-workflow-title{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:.88rem;color:var(--black);margin-bottom:.35rem;}
.cs-workflow-desc{font-size:.75rem;color:var(--gray);line-height:1.5;}

/* OUTCOMES */
.cs-outcome-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin:1.5rem 0;}
.cs-outcome-card{background:var(--surface);border-radius:14px;padding:1.25rem;}
.cs-outcome-val{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.6rem;letter-spacing:-.03em;color:var(--coral);margin-bottom:.25rem;}
.cs-outcome-title{font-size:.82rem;font-weight:500;color:var(--black);margin-bottom:.2rem;}
.cs-outcome-desc{font-size:.73rem;color:var(--gray);line-height:1.5;}

/* QUOTE */
.cs-quote{background:#FFF0EB;border-left:3px solid var(--coral);border-radius:0 12px 12px 0;padding:1.25rem 1.5rem;margin:2rem 0;}
.cs-quote p{font-size:.95rem;color:#9A3412;line-height:1.7;font-style:italic;}
.cs-quote cite{display:block;font-size:.72rem;color:var(--coral);font-style:normal;margin-top:.5rem;font-weight:500;}

/* REFLECTION */
.cs-reflection{background:var(--surface);border-radius:16px;padding:1.75rem;margin:2rem 0;}
.cs-reflection-title{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:1rem;margin-bottom:1rem;}

.cs-reflection-dot{width:6px;height:6px;border-radius:50%;background:var(--coral);flex-shrink:0;margin-top:.45rem;}

.cs-next{background:linear-gradient(135deg,#FFF0EB,#FFE8DF);border-radius:20px;padding:2.5rem;text-align:center;margin-top:4rem;}

.btn-coral{font-size:.86rem;font-weight:500;background:linear-gradient(135deg,#D85A30,#F07B5A);color:#fff;text-decoration:none;padding:.75rem 1.6rem;border-radius:980px;transition:transform .15s;display:inline-block;}

<div class="cs-body">

  <!-- CONTEXT -->
  <div class="cs-section reveal">
    <p class="cs-label">Context</p>
    <h2 class="cs-h2">A powerful legacy tool that needed to become approachable for a new generation of users.</h2>
    <p class="cs-p">Content Services is a SaaS product that helps businesses securely manage content like documents, images, and audio files. It is the new experience of a legacy tool formerly called FileNet. As FileNet transitioned to SaaS, the product needed to become easier to learn, easier to navigate, and more approachable for a broader audience, while still supporting powerful admin workflows.</p>
    <p class="cs-p">The challenge was clear: <strong>how do you simplify a complex legacy admin experience into a modern SaaS product within one year?</strong></p>
    <p class="cs-p">FileNet was successful, but the admin experience was complex and documentation-heavy. Admins had to jump across multiple interfaces to complete work, and terminology felt too technical for new and business-oriented users.</p>
  </div>

  

  <!-- KICKOFF -->
  <div class="cs-section reveal">
    <p class="cs-label">Kickoff</p>
    <h2 class="cs-h2">Starting with a 2-day Enterprise Design Thinking workshop.</h2>
    <p class="cs-p">Before any design work began, I led a 2-day Enterprise Design Thinking workshop with Product Management, Development, Research, Content Design, and my design team. The goal was to build shared understanding, surface assumptions, and align on what mattered most.</p>
    <div class="cs-activity-grid">
      <div class="cs-activity"><div class="cs-activity-num">1</div><p>Hopes and Fears</p></div>
      <div class="cs-activity"><div class="cs-activity-num">2</div><p>As-Is Experience</p></div>
      <div class="cs-activity"><div class="cs-activity-num">3</div><p>Questions and Assumptions</p></div>
      <div class="cs-activity"><div class="cs-activity-num">4</div><p>User Needs</p></div>
      <div class="cs-activity"><div class="cs-activity-num">5</div><p>Big Ideas and Prioritization</p></div>
      <div class="cs-activity"><div class="cs-activity-num">6</div><p>To-Be Experience and Stages</p></div>
    </div>
  </div>

  <!-- RESEARCH -->
  <div class="cs-section reveal">
    <p class="cs-label">Research</p>
    <h2 class="cs-h2">Understanding the admin before redesigning for them.</h2>
    <p class="cs-p">Our researcher conducted secondary research with 6 internal IBMers who worked directly with Content Services clients, followed by 1-hour interviews with 10 content administrators focused on their responsibilities, team structure, pain points, and needs.</p>
    <div class="cs-insights">
      <div class="cs-insight">
        <div class="cs-insight-icon" style="background:#FFF0EB">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="5.5" stroke="#9A3412" stroke-width="1.3"/><path d="M7.5 4.5v3.5" stroke="#9A3412" stroke-width="1.3" stroke-linecap="round"/><circle cx="7.5" cy="10" r=".75" fill="#9A3412"/></svg>
        </div>
        <p><strong>Admins need help getting started.</strong> They did not want to depend on documentation to begin their work.</p>
      </div>
      <div class="cs-insight">
        <div class="cs-insight-icon" style="background:#FFF0EB">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="5.5" stroke="#9A3412" stroke-width="1.3"/><path d="M7.5 4.5v3.5" stroke="#9A3412" stroke-width="1.3" stroke-linecap="round"/><circle cx="7.5" cy="10" r=".75" fill="#9A3412"/></svg>
        </div>
        <p><strong>Multiple interfaces overwhelmed them.</strong> Sending admins to different UIs to complete their work caused confusion and errors.</p>
      </div>
      <div class="cs-insight">
        <div class="cs-insight-icon" style="background:#FFF0EB">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="5.5" stroke="#9A3412" stroke-width="1.3"/><path d="M7.5 4.5v3.5" stroke="#9A3412" stroke-width="1.3" stroke-linecap="round"/><circle cx="7.5" cy="10" r=".75" fill="#9A3412"/></svg>
        </div>
        <p><strong>Terminology was a barrier.</strong> Prospective users struggled to understand FileNet's technical language as the product shifted to business-oriented SaaS users.</p>
      </div>
      <div class="cs-insight">
        <div class="cs-insight-icon" style="background:#E3F9F0">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M2.5 7.5l3 3 7-7" stroke="#1A7A52" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <p><strong>Admins work in teams</strong> with different levels of expertise. The experience needed to support both new and experienced admins.</p>
      </div>
    </div>

    <!-- PERSONA -->
    <div class="cs-persona">
      <div class="cs-persona-avatar">C</div>
      <div>
        <p class="cs-persona-name">Contessa</p>
        <p class="cs-persona-role">The Content Services Administrator</p>
        <p class="cs-persona-desc">An admin at a car insurance company who needs to set up the system so customer service can process auto claims. She manages metadata, secures content by role, and configures the desktop workspace for her team.</p>
      </div>
    </div>
  </div>

  <!-- END-TO-END STORY -->
  <div class="cs-section reveal">
    <p class="cs-label">Design</p>
    <h2 class="cs-h2">Aligning the team around one end-to-end story.</h2>
    <p class="cs-p">During the kickoff workshop, I noticed we had no clear end-to-end user path tied to a real use case. I partnered with three product managers to craft a story around Contessa and her key use case. This gave the team a shared mental model to design and build against.</p>

        <p>Built shared understanding across PM and engineering so everyone was building toward the same goal</p>

        </div>
        <p>Used to validate assumptions with real users in research sessions</p>
