<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLG Onboarding — Susana Chinchilla</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--purple:#4A3AFF;--purple2:#9B8AFF;--purple3:#C084FC;--black:#1D1D1F;--gray:#6E6E73;--border:#E5E5EA;--bg:#F8F8FC;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--black);min-height:100vh;display:flex;flex-direction:column;}

/* soft radial glow background */
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 55% at 20% 30%,rgba(74,58,255,.07) 0%,transparent 70%),radial-gradient(ellipse 50% 40% at 80% 70%,rgba(155,138,255,.05) 0%,transparent 70%);pointer-events:none;z-index:0;}

/* NAV */
nav{position:relative;z-index:10;padding:0 2rem;height:56px;display:flex;align-items:center;}
.nav-logo{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1rem;color:var(--black);text-decoration:none;}
.nav-logo span{color:var(--purple);}

/* GATE */
.gate-wrap{position:relative;z-index:1;flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;}
.gate{width:100%;max-width:340px;display:flex;flex-direction:column;align-items:center;text-align:center;}

/* lock icon */
.lock-icon{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#6B5BFF,#9B8AFF);display:flex;align-items:center;justify-content:center;margin-bottom:1.25rem;box-shadow:0 8px 24px rgba(74,58,255,.25);}

.gate-eyebrow{font-size:.68rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--purple);margin-bottom:.75rem;}
.gate-desc{font-size:.9rem;color:var(--gray);line-height:1.65;margin-bottom:1.75rem;max-width:280px;}

/* input + button */
.gate-form{width:100%;display:flex;flex-direction:column;gap:.6rem;}
.input-wrap{position:relative;display:flex;align-items:center;}
.input-wrap svg{position:absolute;left:.875rem;color:#C7C7CC;flex-shrink:0;}
.gate-input{width:100%;padding:.75rem .875rem .75rem 2.5rem;font-size:.88rem;font-family:'Inter',sans-serif;border:1px solid var(--border);border-radius:10px;background:#fff;color:var(--black);outline:none;transition:border-color .2s,box-shadow .2s;}
.gate-input::placeholder{color:#C7C7CC;}
.gate-input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(74,58,255,.1);}
.gate-input.error{border-color:#D85A30;box-shadow:0 0 0 3px rgba(216,90,48,.1);}

.gate-btn{width:100%;padding:.8rem;background:var(--black);color:#fff;font-size:.88rem;font-weight:600;font-family:'Inter',sans-serif;border:none;border-radius:10px;cursor:pointer;transition:background .2s,transform .15s;display:flex;align-items:center;justify-content:center;gap:6px;}
.gate-btn:hover{background:#333;transform:translateY(-1px);}
.gate-btn:active{transform:translateY(0);}

.gate-hint{font-size:.72rem;color:#AEAEB2;margin-top:.35rem;}
.gate-error{font-size:.75rem;color:#D85A30;margin-top:.25rem;display:none;}
.gate-error.show{display:block;}

.gate-back{display:inline-flex;align-items:center;gap:5px;margin-top:1.5rem;font-size:.82rem;color:var(--purple);text-decoration:none;font-weight:500;transition:opacity .2s;}
.gate-back:hover{opacity:.7;}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">SC<span>.</span></a>
</nav>

<div class="gate-wrap">
  <div class="gate">

    <div class="lock-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <rect x="5" y="11" width="14" height="10" rx="2.5" stroke="#fff" stroke-width="1.8"/>
        <path d="M8 11V7a4 4 0 018 0v4" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="12" cy="16" r="1.5" fill="#fff"/>
      </svg>
    </div>

    <p class="gate-eyebrow">Password Protected</p>
    <p class="gate-desc">Enter the word, take the action, and have a wonderful day!<br>Not sure what it is? Reach out and I'll be happy to share.</p>

    <div class="gate-form">
      <div class="input-wrap">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="3" y="7" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
          <path d="M5.5 7V5a2.5 2.5 0 015 0v2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        <input class="gate-input" id="pw" type="password" placeholder="Enter password" autocomplete="off">
      </div>
      <button class="gate-btn" onclick="checkPw()">Unlock case study &rarr;</button>
      <p class="gate-hint">Password is case sensitive and all caps.</p>
      <p class="gate-error" id="err">Incorrect password. Try again.</p>
    </div>

    <a href="index.html" class="gate-back">&larr; Back to portfolio</a>

  </div>
</div>

<div id="content" style="display:none">
  <!-- Case study content loads here after unlock -->
</div>

<script>
function checkPw() {
  const val = document.getElementById('pw').value;
  const input = document.getElementById('pw');
  const err = document.getElementById('err');
  if (val === 'SMILE') {
    sessionStorage.setItem('sc_unlocked_plg','1');
    window.location.href = 'case-study-plg-content.html';
  } else {
    input.classList.add('error');
    err.classList.add('show');
    input.addEventListener('input', () => { input.classList.remove('error'); err.classList.remove('show'); }, {once:true});
  }
}
document.getElementById('pw').addEventListener('keydown', e => { if(e.key==='Enter') checkPw(); });
</script>
</body>
</html>
