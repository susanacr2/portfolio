<!DOCTYPE html>
<html lang="en">
<head>
  <script>(function(){if(sessionStorage.getItem('sc_access')==='SMILE')return;sessionStorage.setItem('sc_redirect','case-study-plg.html');window.location.href='password.html';})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLG Onboarding · Susana Chinchilla</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231D1D1F'/><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='Georgia,serif' font-weight='700' font-size='13' fill='white'>SC.</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--purple:#4A3AFF;--black:#1D1D1F;--gray:#6E6E73;--border:#E5E5EA;--bg:#F8F8FC;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--black);min-height:100vh;display:flex;flex-direction:column;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 55% at 20% 30%,rgba(74,58,255,.07) 0%,transparent 70%),radial-gradient(ellipse 50% 40% at 80% 70%,rgba(155,138,255,.05) 0%,transparent 70%);pointer-events:none;z-index:0;}
nav{position:relative;z-index:10;padding:0 2rem;height:56px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1rem;color:var(--black);text-decoration:none;}
.nav-logo span{color:var(--purple);}
.back-link{display:inline-flex;align-items:center;gap:6px;padding:.4rem .9rem;font-size:.8rem;font-weight:500;color:var(--purple);text-decoration:none;background:transparent;border:0.5px solid rgba(74,58,255,.2);border-radius:980px;transition:border-color .2s,opacity .2s;}
.back-link:hover{border-color:var(--purple);opacity:.7;}
.gate-wrap{position:relative;z-index:1;flex:1;display:flex;align-items:flex-start;justify-content:center;padding:5rem 2rem 2rem;}
.gate{width:100%;max-width:380px;display:flex;flex-direction:column;align-items:center;text-align:center;}
.lock-icon{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#6B5BFF,#9B8AFF);display:flex;align-items:center;justify-content:center;margin-bottom:1.5rem;box-shadow:0 8px 24px rgba(74,58,255,.25);}
.gate-h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:clamp(2.5rem,6vw,3.5rem);letter-spacing:-.035em;line-height:1.05;color:var(--purple);margin-bottom:.75rem;}
.gate-desc{font-size:.95rem;color:var(--gray);line-height:1.6;margin-bottom:2rem;}
.gate-form{width:100%;display:flex;flex-direction:column;gap:.6rem;}
.input-wrap{position:relative;display:flex;align-items:center;}
.input-wrap svg{position:absolute;left:.875rem;color:#C7C7CC;flex-shrink:0;}
.gate-input{width:100%;padding:.78rem .875rem .78rem 2.5rem;font-size:.88rem;font-family:'Inter',sans-serif;border:1px solid var(--border);border-radius:10px;background:#fff;color:var(--black);outline:none;transition:border-color .2s,box-shadow .2s;}
.gate-input::placeholder{color:#C7C7CC;}
.gate-input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(74,58,255,.1);}
.gate-input.error{border-color:#D85A30;box-shadow:0 0 0 3px rgba(216,90,48,.1);}
.gate-btn{width:100%;padding:.82rem;background:var(--black);color:#fff;font-size:.88rem;font-weight:600;font-family:'Inter',sans-serif;border:none;border-radius:10px;cursor:pointer;transition:background .2s,transform .15s;display:flex;align-items:center;justify-content:center;gap:6px;}
.gate-btn:hover{background:#333;transform:translateY(-1px);}
.gate-btn:active{transform:translateY(0);}
.gate-hint{font-size:.75rem;color:#AEAEB2;margin-top:.35rem;}
.gate-hint a{color:var(--purple);font-weight:600;text-decoration:none;}
.gate-hint a:hover{text-decoration:underline;}
.gate-error{font-size:.75rem;color:#D85A30;margin-top:.25rem;display:none;}
.gate-error.show{display:block;}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="back-link">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Back
  </a>
  <a href="index.html" class="nav-logo">SC<span>.</span></a>
</nav>
<div class="gate-wrap">
  <div class="gate">
    <div class="lock-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <rect x="5" y="11" width="14" height="10" rx="2.5" stroke="#fff" stroke-width="1.8"/>
        <path d="M8 11V7a4 4 0 018 0v4" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="12" cy="16" r="1.5" fill="#fff"/>
      </svg>
    </div>
    <h1 class="gate-h1">This one's locked.</h1>
    <p class="gate-desc">This one isn't public. Please enter the password.</p>
    <div class="gate-form">
      <div class="input-wrap">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="3" y="7" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
          <path d="M5.5 7V5a2.5 2.5 0 015 0v2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        <input class="gate-input" id="pw" type="password" placeholder="Enter password" autocomplete="off">
      </div>
      <button class="gate-btn" onclick="checkPw()">Unlock case study &rarr;</button>
      <p class="gate-hint">Not sure what it is? <a href="mailto:suschinchilla@gmail.com">Reach out.</a></p>
      <p class="gate-error" id="err">Incorrect password. Try again.</p>
    </div>
  </div>
</div>
<script>
// If already unlocked, go straight to content
if (sessionStorage.getItem('sc_access') === 'SMILE') {
  window.location.href = 'case-study-plg.html';
}
function checkPw() {
  const val = document.getElementById('pw').value;
  const input = document.getElementById('pw');
  const err = document.getElementById('err');
  if (val === 'SMILE') {
    sessionStorage.setItem('sc_access', 'SMILE');
    window.location.href = 'case-study-plg.html';
  } else {
    input.classList.add('error');
    err.classList.add('show');
    input.addEventListener('input', () => { input.classList.remove('error'); err.classList.remove('show'); }, {once:true});
  }
}
document.getElementById('pw').addEventListener('keydown', e => { if(e.key==='Enter') checkPw(); });
</script>
</body>
</html>
