<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Password Protected · SC.</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%234A3AFF'/><text x='16' y='22' font-family='Georgia,serif' font-weight='bold' font-size='14' fill='white' text-anchor='middle'>SC.</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--purple:#4A3AFF;--purple2:#9B8AFF;--purple3:#C084FC;--black:#1D1D1F;--gray:#6E6E73;--border:#D2D2D7;--surface:#F5F5F7;}
body{font-family:'Inter',sans-serif;background:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;}

/* Background blobs */
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 60% 50% at 15% 20%, rgba(74,58,255,.05) 0%, transparent 60%),
             radial-gradient(ellipse 50% 40% at 85% 80%, rgba(192,132,252,.06) 0%, transparent 60%);
  pointer-events:none;
}

.wrap{
  position:relative;z-index:1;
  max-width:420px;width:100%;
  text-align:center;
}

/* Lock icon */
.lock{
  width:56px;height:56px;border-radius:16px;
  background:linear-gradient(135deg,#4A3AFF,#9B8AFF);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 1.5rem;
  box-shadow:0 4px 20px rgba(74,58,255,.2);
}

.eyebrow{
  font-size:.72rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--purple);margin-bottom:.75rem;
}

h1{
  font-family:'Bricolage Grotesque',sans-serif;font-weight:800;
  font-size:1.75rem;letter-spacing:-.035em;color:var(--black);
  margin-bottom:.5rem;line-height:1.1;
}

.subtitle{
  font-size:.88rem;color:var(--gray);line-height:1.7;
  margin-bottom:2rem;max-width:340px;margin-left:auto;margin-right:auto;
}

/* Form */
.form{display:flex;flex-direction:column;gap:.75rem;}

.input-wrap{position:relative;}
.pw-input{
  width:100%;padding:.8rem 1rem .8rem 3rem;
  border:0.5px solid var(--border);border-radius:12px;
  font-size:.9rem;font-family:'Inter',sans-serif;
  color:var(--black);background:#fff;outline:none;
  transition:border .2s,box-shadow .2s;
  text-align:center;letter-spacing:.15em;font-weight:500;
}
.pw-input::placeholder{letter-spacing:.02em;font-weight:400;color:#B0ADB8;}
.pw-input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(74,58,255,.08);}
.pw-icon{
  position:absolute;left:1rem;top:50%;transform:translateY(-50%);
  color:var(--border);pointer-events:none;
}

.submit-btn{
  width:100%;padding:.8rem;
  background:var(--black);color:#fff;
  border:none;border-radius:12px;
  font-size:.88rem;font-weight:500;font-family:'Inter',sans-serif;
  cursor:pointer;transition:background .2s,transform .1s;
}
.submit-btn:hover{background:#3634A3;}
.submit-btn:active{transform:scale(.99);}

.hint{
  font-size:.72rem;color:#B0ADB8;margin-top:.5rem;line-height:1.6;
}

/* Error state */
.error-msg{
  display:none;font-size:.78rem;color:#D85A30;
  background:#FFF0EB;border-radius:8px;padding:.5rem .75rem;
  margin-top:-.25rem;
}
.error-msg.show{display:block;}

/* Back link */
.back{
  margin-top:2rem;font-size:.78rem;color:var(--gray);
}
.back a{color:var(--purple);text-decoration:none;font-weight:500;}
.back a:hover{text-decoration:underline;}

/* Logo */
.logo{
  position:fixed;top:1.5rem;left:1.5rem;
  font-family:'Bricolage Grotesque',sans-serif;font-weight:800;
  font-size:1.1rem;letter-spacing:-.03em;color:var(--black);
  text-decoration:none;
}
.logo span{color:var(--purple);}
</style>
</head>
<body>

<a href="index.html" class="logo">SC<span>.</span></a>

<div class="wrap">
  <div class="lock">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
      <rect x="5" y="11" width="14" height="10" rx="2.5" stroke="white" stroke-width="1.6"/>
      <path d="M8 11V7a4 4 0 018 0v4" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
      <circle cx="12" cy="16" r="1.5" fill="white"/>
    </svg>
  </div>

  <p class="eyebrow">Password protected</p>
  <p class="subtitle">Enter the word, take the action, and have a wonderful day!<br>Not sure what it is? Reach out and I'll be happy to share.</p>

  <div class="form">
    <div class="input-wrap">
      <svg class="pw-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="3" y="7" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
        <path d="M5 7V5a3 3 0 016 0v2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <input id="pw" type="password" class="pw-input" placeholder="Enter password" autocomplete="off" onkeydown="if(event.key==='Enter')checkPw()">
    </div>
    <div id="error" class="error-msg">That's not quite it. Try again or reach out!</div>
    <button class="submit-btn" onclick="checkPw()">Unlock case study →</button>
    <p class="hint">Password is case sensitive and all caps.</p>
  </div>

  <div class="back">
    <a href="index.html">← Back to portfolio</a>
  </div>
</div>

<script>
function checkPw(){
  var val = document.getElementById('pw').value;
  var err = document.getElementById('error');
  if(val === 'SMILE'){
    sessionStorage.setItem('sc_access','SMILE');
    var redirect = sessionStorage.getItem('sc_redirect') || 'index.html';
    sessionStorage.removeItem('sc_redirect');
    window.location.href = redirect;
  } else {
    err.classList.add('show');
    document.getElementById('pw').style.borderColor='#D85A30';
    document.getElementById('pw').style.boxShadow='0 0 0 3px rgba(216,90,48,.08)';
    setTimeout(function(){
      err.classList.remove('show');
      document.getElementById('pw').style.borderColor='';
      document.getElementById('pw').style.boxShadow='';
    }, 3000);
  }
}
</script>
</body>
</html>
