<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protected · Susana Chinchilla</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#fff;
  --surface:#F5F5F7;
  --black:#1D1D1F;
  --gray:#6E6E73;
  --border:#D2D2D7;
  --teal:#00C98D;
  --teal-bg:#E3F9F0;
  --teal-dark:#1A7A52;
  --purple:#4A3AFF;
  --purple-bg:#EEF0FF;
  --error:#D85A30;
  --error-bg:#FFF0EB;
}
html{height:100%;scroll-behavior:smooth;}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--black);
  font-size:16px;
  line-height:1.6;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 2.5rem;height:56px;
  background:rgba(255,255,255,.88);
  backdrop-filter:blur(20px);
  border-bottom:0.5px solid var(--border);
}
.nav-logo{
  font-family:'Bricolage Grotesque',sans-serif;
  font-weight:700;font-size:1rem;
  color:var(--black);text-decoration:none;
}
.nav-logo span{color:var(--teal);}

/* MAIN */
main{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:6rem 1.5rem 3rem;
}

.gate-card{
  width:100%;max-width:400px;
  text-align:center;
  animation:fadeUp .55s ease both;
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

.gate-icon{
  width:52px;height:52px;
  border-radius:16px;
  background:var(--teal-bg);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 1.5rem;
}

.gate-title{
  font-family:'Bricolage Grotesque',sans-serif;
  font-weight:800;
  font-size:clamp(1.6rem,4vw,2.2rem);
  letter-spacing:-.035em;
  line-height:1.1;
  margin-bottom:.625rem;
}
.gate-title .grad{
  background:linear-gradient(270deg,#00C98D,#5DCAA5,#00C98D);
  background-size:300% 300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:gradShift 6s ease infinite;
}
@keyframes gradShift{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.gate-sub{
  font-size:.9rem;
  font-weight:300;
  color:var(--gray);
  line-height:1.7;
  margin-bottom:2rem;
}

/* FORM */
.gate-field{
  position:relative;
  margin-bottom:.75rem;
}
.gate-input{
  width:100%;
  font-family:'Inter',sans-serif;
  font-size:.95rem;
  font-weight:400;
  color:var(--black);
  background:var(--surface);
  border:0.5px solid var(--border);
  border-radius:12px;
  padding:.85rem 3rem .85rem 1.1rem;
  outline:none;
  transition:border-color .2s, box-shadow .2s, background .2s;
  letter-spacing:.08em;
}
.gate-input::placeholder{letter-spacing:0;color:var(--gray);}
.gate-input:focus{
  border-color:var(--teal);
  box-shadow:0 0 0 3px rgba(0,201,141,.12);
  background:#fff;
}
.gate-input.error{
  border-color:var(--error);
  box-shadow:0 0 0 3px rgba(216,90,48,.1);
  animation:shake .35s ease;
}
@keyframes shake{
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-5px);}
  60%{transform:translateX(5px);}
  80%{transform:translateX(-3px);}
}

/* toggle visibility btn */
.toggle-vis{
  position:absolute;right:.85rem;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;
  color:var(--gray);padding:4px;
  display:flex;align-items:center;justify-content:center;
  transition:color .2s;
}
.toggle-vis:hover{color:var(--black);}

.gate-btn{
  width:100%;
  font-family:'Inter',sans-serif;
  font-size:.9rem;
  font-weight:500;
  color:#fff;
  background:linear-gradient(135deg,#00C98D,#5DCAA5);
  border:none;
  border-radius:12px;
  padding:.875rem 1.5rem;
  cursor:pointer;
  transition:transform .15s, box-shadow .15s;
  display:flex;align-items:center;justify-content:center;gap:.5rem;
  letter-spacing:.01em;
  margin-top:.25rem;
}
.gate-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,201,141,.3);}
.gate-btn:active{transform:translateY(0);}
.gate-btn svg{transition:transform .2s;}
.gate-btn:hover svg{transform:translateX(3px);}

/* ERROR STATE */
.gate-error{
  display:none;
  align-items:center;
  gap:.5rem;
  background:var(--error-bg);
  border:0.5px solid rgba(216,90,48,.2);
  border-radius:10px;
  padding:.65rem .9rem;
  margin-bottom:.75rem;
  font-size:.8rem;
  color:var(--error);
  text-align:left;
  animation:fadeUp .25s ease;
}
.gate-error.visible{display:flex;}

/* HINT */
.gate-hint{
  margin-top:1.25rem;
  font-size:.75rem;
  color:var(--gray);
  line-height:1.6;
}
.gate-hint a{
  color:var(--teal-dark);
  text-decoration:none;
  font-weight:500;
}
.gate-hint a:hover{text-decoration:underline;}

/* DIVIDER */
.gate-divider{
  display:flex;align-items:center;gap:.75rem;
  margin:1.5rem 0;
  color:var(--border);
  font-size:.72rem;
  color:var(--gray);
}
.gate-divider::before,.gate-divider::after{
  content:'';flex:1;height:0.5px;background:var(--border);
}

/* FOOTER */
footer{
  text-align:center;
  padding:1.5rem;
  font-size:.72rem;
  color:var(--gray);
  border-top:0.5px solid var(--border);
}

@media(max-width:500px){
  nav{padding:0 1.25rem;}
  main{padding-top:5rem;}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">SC<span>.</span></a>
</nav>

<main>
  <div class="gate-card">

    <div class="gate-icon">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <rect x="4" y="10" width="14" height="10" rx="3" stroke="#00C98D" stroke-width="1.5"/>
        <path d="M7.5 10V7a3.5 3.5 0 017 0v3" stroke="#00C98D" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="11" cy="15" r="1.25" fill="#00C98D"/>
      </svg>
    </div>

    <h1 class="gate-title">Password <span class="grad">required</span></h1>
    <p class="gate-sub">This case study is password protected.<br>Enter the password to continue.</p>

    <div class="gate-error" id="errorMsg">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="#D85A30" stroke-width="1.2"/><path d="M7 4.5v3M7 9.5v.25" stroke="#D85A30" stroke-width="1.3" stroke-linecap="round"/></svg>
      Incorrect password. Please try again.
    </div>

    <div class="gate-field">
      <input
        class="gate-input"
        id="pwInput"
        type="password"
        placeholder="Enter password"
        autocomplete="current-password"
        spellcheck="false"
        autofocus
      >
      <button class="toggle-vis" id="toggleVis" type="button" aria-label="Show password">
        <svg id="eyeIcon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z" stroke="currentColor" stroke-width="1.3"/>
          <circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.3"/>
        </svg>
      </button>
    </div>

    <button class="gate-btn" id="submitBtn" type="button">
      Enter
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7h8M8 4l3 3-3 3" stroke="#fff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <p class="gate-hint">
      Need access? <a href="mailto:susana@example.com">Request the password</a>
    </p>

  </div>
</main>

<footer>
  &copy; 2025 Susana Chinchilla · All rights reserved
</footer>

<script>
const CORRECT_PASSWORD = 'SMILE';

const input    = document.getElementById('pwInput');
const btn      = document.getElementById('submitBtn');
const errorMsg = document.getElementById('errorMsg');
const toggleVis= document.getElementById('toggleVis');
const eyeIcon  = document.getElementById('eyeIcon');

// Eye icons
const eyeOpen = `<path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z" stroke="currentColor" stroke-width="1.3"/><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.3"/>`;
const eyeOff  = `<path d="M1 1l14 14M6.53 6.59A2 2 0 0010.41 10.47M9.88 3.18C9.27 3.07 8.64 3 8 3 3.5 3 1 8 1 8a12.1 12.1 0 002.27 2.95M5.17 5.17A7.87 7.87 0 001 8s2.5 5 7 5c1.5 0 2.87-.42 4-.17M12.43 12.43A7.73 7.73 0 0015 8s-2.5-5-7-5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>`;

let visible = false;
toggleVis.addEventListener('click', () => {
  visible = !visible;
  input.type = visible ? 'text' : 'password';
  eyeIcon.innerHTML = visible ? eyeOff : eyeOpen;
});

function attempt() {
  const val = input.value.trim();
  if (val === CORRECT_PASSWORD) {
    sessionStorage.setItem('sc_access', CORRECT_PASSWORD);
    // Redirect to the page the user was trying to reach, or index
    const dest = sessionStorage.getItem('sc_redirect') || 'index.html';
    sessionStorage.removeItem('sc_redirect');
    window.location.href = dest;
  } else {
    errorMsg.classList.add('visible');
    input.classList.add('error');
    input.value = '';
    input.focus();
    setTimeout(() => input.classList.remove('error'), 400);
  }
}

btn.addEventListener('click', attempt);
input.addEventListener('keydown', e => { if (e.key === 'Enter') attempt(); });
input.addEventListener('input', () => {
  errorMsg.classList.remove('visible');
});
</script>

</body>
</html>
